name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. new pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # The warp/ submodule is C++ and not needed to build or test the Go
        # module, so we deliberately do not fetch submodules.
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # No go.sum (stdlib-only module) -> nothing to cache; avoids a warning.
          cache: false

      # `make lint` runs staticcheck when it is on PATH; install it first so CI
      # enforces it (locally it is an optional skip). Other checks (gofmt, go
      # generate sync, go vet) use the toolchain directly.
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2024.1.1

      - name: Lint
        run: make lint

  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # No go.sum (stdlib-only module) -> nothing to cache; avoids a warning.
          cache: false

      # The amd64 codegen tests assemble fixtures with wat2wasm and disassemble
      # with objdump; without wabt those tests t.Skip and silently pass.
      - name: Install wabt (wat2wasm)
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Build & test
        run: make test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # No go.sum (stdlib-only module) -> nothing to cache; avoids a warning.
          cache: false

      # Same wabt dependency as the test job, so the amd64 codegen tests run and
      # count toward coverage instead of skipping.
      - name: Install wabt (wat2wasm)
        run: sudo apt-get update && sudo apt-get install -y wabt

      # `make cover` runs the suite with -coverpkg=./... and appends a
      # per-package report to the job summary ($GITHUB_STEP_SUMMARY).
      - name: Coverage
        run: make cover

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error
