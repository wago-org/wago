name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. new pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # The warp/ submodule is C++ and not needed to build or test the Go
        # module, so we deliberately do not fetch submodules.
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # No go.sum (stdlib-only module) -> nothing to cache; avoids a warning.
          cache: false

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2024.1.1"
          install-go: false

  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # No go.sum (stdlib-only module) -> nothing to cache; avoids a warning.
          cache: false

      # The amd64 codegen tests assemble fixtures with wat2wasm and disassemble
      # with objdump; without wabt those tests t.Skip and silently pass.
      - name: Install wabt (wat2wasm)
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -count=1 ./...
