name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. new pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"

jobs:
  # Decide whether the change can affect executable code. Docs-only changes skip
  # the expensive jobs; every code change runs the complete native platform
  # matrix so architecture and OS interactions cannot hide behind path filters.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.derive.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Avoid a separate PR-files API call; compare the checked-out merge
          # ref with the base SHA from the pull_request event instead.
          token: ''
          filters: |
            docs:
              - '**/*.md'
              - 'docs/**'
              - 'LICENSE'
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!LICENSE'
      - name: Derive job gates
        id: derive
        run: |
          code='${{ steps.filter.outputs.code }}'
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "gate: code=$code"

  lint:
    name: Lint & format
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # The warp/ submodule is C++ and not needed to build or test the Go
        # module, so we deliberately do not fetch submodules.
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # No go.sum (stdlib-only module) -> nothing to cache; avoids a warning.
          cache: false

      # `make lint` runs staticcheck when it is on PATH; install it first so CI
      # enforces it (locally it is an optional skip). Other checks (gofmt, go
      # generate sync, go vet) use the toolchain directly.
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2024.1.1

      - name: Lint
        run: make lint

  platform-test:
    name: ${{ matrix.name }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / amd64
            runner: ubuntu-24.04
            goos: linux
            goarch: amd64
            runtime: true
            guard: true
            corpus: true
          - name: Linux / arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            runtime: true
            guard: true
            corpus: true
          - name: Darwin / amd64
            runner: macos-15-intel
            goos: darwin
            goarch: amd64
            runtime: false
            guard: false
            corpus: false
          - name: Darwin / arm64
            runner: macos-15
            goos: darwin
            goarch: arm64
            runtime: true
            guard: true
            corpus: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # No go.sum (stdlib-only module) -> nothing to cache; avoids a warning.
          cache: false

      # Runtime codegen uses syntax unavailable in distro WABT releases. Publish
      # the checksum-pinned tool directory on every supported runtime host.
      - name: Bootstrap pinned WABT
        if: matrix.runtime
        run: |
          scripts/bootstrap-wabt.sh --verify
          echo "$(dirname "$(scripts/bootstrap-wabt.sh --print-path)")" >> "$GITHUB_PATH"

      # Only linux/amd64 builds the supplementary official Core 3 tests during
      # ordinary package testing. Initialize and build their authoritative
      # interpreter fallback there; other runtime cells avoid the large OCaml
      # toolchain and verify the portable/backend surface directly.
      - name: Initialize Release 3 suite
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: git submodule update --init --depth=1 tests/spec-v3

      - name: Install Release 3 interpreter toolchain
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: sudo apt-get update && sudo apt-get install -y ocaml-nox ocaml-dune menhir

      - name: Bootstrap pinned Release 3 interpreter
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          interpreter="$(scripts/bootstrap-spec-interpreter.sh --print-path)"
          scripts/bootstrap-spec-interpreter.sh --verify
          echo "WAGO_SPEC_INTERPRETER=$interpreter" >> "$GITHUB_ENV"
          echo "WAGO_SPEC_INTERPRETER_REVISION=$(scripts/bootstrap-spec-interpreter.sh --print-revision)" >> "$GITHUB_ENV"

      - name: Verify native runner
        run: |
          test "$(go env GOOS)" = "${{ matrix.goos }}"
          test "$(go env GOARCH)" = "${{ matrix.goarch }}"
          go version
          uname -a

      - name: Build & test
        if: matrix.runtime
        run: make test

      # Darwin/amd64 is not yet a supported native runtime target. Keep its
      # architecture-neutral compiler and encoder surface honest without
      # implying that the JIT ABI is implemented there.
      - name: Portable compiler tests
        if: ${{ !matrix.runtime }}
        run: go test -count=1 ./internal/... ./src/core/compiler/codegen ./src/core/compiler/ir ./src/core/compiler/wasm ./src/core/encoder/amd64 ./src/core/encoder/arm64

      # Guard-page (signals-based) mode is behind a build tag, so `make test`
      # never exercises it — which is how a broken SIGSEGV fault->trap handler
      # stayed CI-invisible. This runs the fault->trap path plus in-bounds
      # differential correctness under the tag.
      - name: Guard-page trap tests
        if: matrix.guard
        run: make test-guard

      - name: Corpus correctness matrix
        if: matrix.corpus
        env:
          WAGO_CORPUS_TIMEOUT: 20s
        run: make test-corpus

      - name: Fetch SIMD proposal suite
        if: matrix.runtime
        run: git submodule update --init tests/spec

      - name: SIMD execution suite
        if: matrix.runtime
        run: make simd

  tinygo:
    name: TinyGo / ${{ matrix.name }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / amd64
            runner: ubuntu-24.04
            runtime: true
            cli: true
          - name: Linux / arm64
            runner: ubuntu-24.04-arm
            runtime: true
            cli: true
          - name: Darwin / amd64
            runner: macos-15-intel
            runtime: false
            cli: false
          - name: Darwin / arm64
            runner: macos-15
            runtime: true
            cli: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: "0.41.1"
          # Native builds do not use Binaryen, whose pinned release has no
          # Linux/arm64 artifact and otherwise makes setup fail with a 404.
          install-binaryen: false

      # TinyGo links native linux/amd64 binaries with LLVM lld; the runner needs
      # ld.lld on PATH (otherwise: "ROM segments are non-contiguous").
      - name: Install lld
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y lld

      # Compile portability: the whole pipeline (wasm -> amd64 -> runtime ->
      # public API + CLI) must build under TinyGo. A NOTE: the output name must
      # not end in .bin, which TinyGo treats as a firmware image.
      - name: Build CLI with TinyGo
        if: matrix.cli
        run: make tinygo-build

      # Runtime behavior exercises the generated amd64/arm64 foreign-stack
      # trampolines and synchronous host-call resume path natively.
      - name: Test (runtime + public API) under TinyGo
        if: matrix.runtime
        run: make tinygo-test

      # Darwin/amd64 mirrors the Big Go matrix: the native JIT ABI is not yet
      # implemented, but architecture-neutral compiler and encoder code must
      # remain buildable and testable under TinyGo.
      - name: Portable compiler tests under TinyGo
        if: ${{ !matrix.runtime }}
        run: tinygo test ./src/core/compiler/codegen ./src/core/compiler/ir ./src/core/encoder/amd64 ./src/core/encoder/arm64

      # End-to-end smoke: the TinyGo-built JIT must execute a real module.
      - name: Smoke-run a real module
        if: matrix.cli
        run: |
          out="$(./wago-tinygo run --invoke fib tests/testdata/fib.wasm 20)"
          echo "$out"
          test "$out" = "fib(20) = 6765"

  # The CI card is built by three jobs so the expensive bits run in parallel: this
  # job produces the Go-only fragments (coverage/tests/spec), the `size` job builds
  # the TinyGo release binary for the "Build size" fragment, and `card-comment`
  # waits for both, assembles, and posts the sticky comment.
  coverage:
    name: Coverage
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # No go.sum (stdlib-only module) -> nothing to cache; avoids a warning.
          cache: false

      - name: Initialize Release 3 suite
        run: git submodule update --init --depth=1 tests/spec-v3

      # Coverage executes the same Core 3 tests as the native matrix, including
      # source forms that require the official interpreter fallback.
      - name: Install Release 3 interpreter toolchain
        run: sudo apt-get update && sudo apt-get install -y ocaml-nox ocaml-dune menhir

      - name: Bootstrap pinned Core 3 tools
        run: |
          scripts/bootstrap-wabt.sh --verify
          echo "$(dirname "$(scripts/bootstrap-wabt.sh --print-path)")" >> "$GITHUB_PATH"
          interpreter="$(scripts/bootstrap-spec-interpreter.sh --print-path)"
          scripts/bootstrap-spec-interpreter.sh --verify
          echo "WAGO_SPEC_INTERPRETER=$interpreter" >> "$GITHUB_ENV"
          echo "WAGO_SPEC_INTERPRETER_REVISION=$(scripts/bootstrap-spec-interpreter.sh --print-revision)" >> "$GITHUB_ENV"

      # Produce the coverage/tests/spec fragments. On PRs, CARD_BASELINE_REF
      # measures main in a worktree for the "Δ vs main" columns, so fetch main.
      # The spec fragment runs last and initializes its own corpora, keeping
      # known spec gaps informational instead of feeding them into coverage or
      # ordinary test counts.
      - name: Produce card fragments
        env:
          CARD_BASELINE_REF: ${{ github.event_name == 'pull_request' && 'origin/main' || '' }}
        run: |
          if [ -n "$CARD_BASELINE_REF" ]; then
            git fetch --no-tags --depth=1 origin main
          fi
          make card-fragments

      - name: Upload card fragments
        uses: actions/upload-artifact@v4
        with:
          name: card-fragments
          path: ci-card
          if-no-files-found: error

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

  size:
    name: Build size
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      # TinyGo (+ lld) to build the size-minimized release CLI (make build-release).
      - uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: "0.41.1"
      - name: Install lld
        run: sudo apt-get update && sudo apt-get install -y lld

      - name: Measure release binary size
        env:
          CARD_BASELINE_REF: ${{ github.event_name == 'pull_request' && 'origin/main' || '' }}
        run: |
          if [ -n "$CARD_BASELINE_REF" ]; then
            git fetch --no-tags --depth=1 origin main
          fi
          mkdir -p ci-card
          SIZE_REPORT=ci-card/size.md scripts/size-card.sh

      - name: Upload size fragment
        uses: actions/upload-artifact@v4
        with:
          name: card-size
          path: ci-card/size.md
          if-no-files-found: error

  card-comment:
    name: Comment CI card
    needs: [coverage, size]
    runs-on: ubuntu-latest
    # Only PRs from this repo get a comment; fork PRs have a read-only token.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download card fragments
        uses: actions/download-artifact@v4
        with:
          name: card-fragments
          path: ci-card
      - name: Download size fragment
        uses: actions/download-artifact@v4
        with:
          name: card-size
          path: ci-card
      - name: Assemble and post the CI card
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CARD_DIR=ci-card CARD_FILE=card.md scripts/pr-card.sh
          scripts/pr-card-comment.sh

  # Single aggregation gate. Because the path-gated jobs above can be "skipped",
  # make THIS the sole required status check in branch protection: it always runs
  # and passes only if no needed job actually failed (skipped/success both pass).
  ci-ok:
    name: CI
    if: always()
    needs: [changes, lint, platform-test, tinygo, coverage, size]
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "job results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::a required job did not pass ($r)"
              exit 1
            fi
          done
          echo "all required jobs passed or were skipped"
