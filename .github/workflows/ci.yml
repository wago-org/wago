name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. new pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"

jobs:
  # Decide whether the change can affect executable code. Docs-only changes skip
  # the expensive jobs; every code change runs the complete native platform
  # matrix so architecture and OS interactions cannot hide behind path filters.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.derive.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - '**/*.md'
              - 'docs/**'
              - 'LICENSE'
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!LICENSE'
      - name: Derive job gates
        id: derive
        run: |
          code='${{ steps.filter.outputs.code }}'
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "gate: code=$code"

  lint:
    name: Lint & format
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # The warp/ submodule is C++ and not needed to build or test the Go
        # module, so we deliberately do not fetch submodules.
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # No go.sum (stdlib-only module) -> nothing to cache; avoids a warning.
          cache: false

      # `make lint` runs staticcheck when it is on PATH; install it first so CI
      # enforces it (locally it is an optional skip). Other checks (gofmt, go
      # generate sync, go vet) use the toolchain directly.
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@2024.1.1

      - name: Lint
        run: make lint

  platform-test:
    name: ${{ matrix.name }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / amd64
            runner: ubuntu-24.04
            goos: linux
            goarch: amd64
            runtime: true
            guard: true
            corpus: true
          - name: Linux / arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            runtime: true
            guard: true
            corpus: true
          - name: Darwin / amd64
            runner: macos-15-intel
            goos: darwin
            goarch: amd64
            runtime: false
            guard: false
            corpus: false
          - name: Darwin / arm64
            runner: macos-15
            goos: darwin
            goarch: arm64
            runtime: true
            guard: true
            corpus: true
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # No go.sum (stdlib-only module) -> nothing to cache; avoids a warning.
          cache: false

      # Codegen and corpus tests use wat2wasm. Install it on every platform so
      # missing tooling cannot turn coverage into a silent skip.
      - name: Install wabt (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y wabt
      - name: Install wabt (macOS)
        if: runner.os == 'macOS'
        run: brew install wabt

      - name: Verify native runner
        run: |
          test "$(go env GOOS)" = "${{ matrix.goos }}"
          test "$(go env GOARCH)" = "${{ matrix.goarch }}"
          go version
          uname -a

      - name: Build & test
        if: matrix.runtime
        run: make test

      # Darwin/amd64 is not yet a supported native runtime target. Keep its
      # architecture-neutral compiler and encoder surface honest without
      # implying that the JIT ABI is implemented there.
      - name: Portable compiler tests
        if: ${{ !matrix.runtime }}
        run: go test -count=1 ./internal/... ./src/core/compiler/codegen ./src/core/compiler/ir ./src/core/compiler/wasm ./src/core/encoder/amd64 ./src/core/encoder/arm64

      # Guard-page (signals-based) mode is behind a build tag, so `make test`
      # never exercises it — which is how a broken SIGSEGV fault->trap handler
      # stayed CI-invisible. This runs the fault->trap path plus in-bounds
      # differential correctness under the tag.
      - name: Guard-page trap tests
        if: matrix.guard
        run: make test-guard

      - name: Corpus correctness matrix
        if: matrix.corpus
        env:
          WAGO_CORPUS_TIMEOUT: 20s
        run: make test-corpus

  spec2:
    name: WebAssembly 2.0 spec
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install wabt (wast2json)
        run: sudo apt-get update && sudo apt-get install -y wabt

      - name: Fetch pinned WebAssembly 2.0 spec
        run: git submodule update --init tests/spec-v2

      - name: Run WebAssembly 2.0 core suite
        run: make spec2

  tinygo:
    name: TinyGo build & test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: "0.41.1"

      # TinyGo links native linux/amd64 binaries with LLVM lld; the runner needs
      # ld.lld on PATH (otherwise: "ROM segments are non-contiguous").
      - name: Install lld
        run: sudo apt-get update && sudo apt-get install -y lld

      # Compile portability: the whole pipeline (wasm -> amd64 -> runtime ->
      # public API + CLI) must build under TinyGo. A NOTE: the output name must
      # not end in .bin, which TinyGo treats as a firmware image.
      - name: Build CLI with TinyGo
        run: make tinygo-build

      # Runtime behavior: this exercises enterNative through the generated
      # trampoline (trampoline_tinygo_amd64.go). If TinyGo's func-value ABI ever
      # diverges from the System V assumption it relies on, these fail loudly.
      - name: Test (runtime + public API) under TinyGo
        run: make tinygo-test

      # End-to-end smoke: the TinyGo-built JIT must execute a real module.
      - name: Smoke-run a real module
        run: |
          out="$(./wago-tinygo run --invoke fib tests/testdata/fib.wasm 20)"
          echo "$out"
          test "$out" = "fib(20) = 6765"

  # The CI card is built by three jobs so the expensive bits run in parallel: this
  # job produces the Go-only fragments (coverage/tests/spec), the `size` job builds
  # the TinyGo release binary for the "Build size" fragment, and `card-comment`
  # waits for both, assembles, and posts the sticky comment.
  coverage:
    name: Coverage
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # No go.sum (stdlib-only module) -> nothing to cache; avoids a warning.
          cache: false

      # wabt provides wast2json for the WebAssembly spec-suite card producer (and
      # wat2wasm for the codegen tests that feed coverage).
      - name: Install wabt (wast2json / wat2wasm)
        run: sudo apt-get update && sudo apt-get install -y wabt

      # The spec-suite and WASI-suite card producers replay the WebAssembly
      # testsuites; fetch only those submodules (not the large C++ warp/ one).
      - name: Fetch spec + WASI testsuite submodules
        run: git submodule update --init tests/spec tests/spec-v2 tests/wasi

      # Produce the coverage/tests/spec fragments. On PRs, CARD_BASELINE_REF
      # measures main in a worktree for the "Δ vs main" columns, so fetch main.
      - name: Produce card fragments
        env:
          CARD_BASELINE_REF: ${{ github.event_name == 'pull_request' && 'origin/main' || '' }}
        run: |
          if [ -n "$CARD_BASELINE_REF" ]; then
            git fetch --no-tags --depth=1 origin main
          fi
          make card-fragments

      - name: Upload card fragments
        uses: actions/upload-artifact@v4
        with:
          name: card-fragments
          path: ci-card
          if-no-files-found: error

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

  size:
    name: Build size
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      # TinyGo (+ lld) to build the size-minimized release CLI (make build-release).
      - uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: "0.41.1"
      - name: Install lld
        run: sudo apt-get update && sudo apt-get install -y lld

      - name: Measure release binary size
        env:
          CARD_BASELINE_REF: ${{ github.event_name == 'pull_request' && 'origin/main' || '' }}
        run: |
          if [ -n "$CARD_BASELINE_REF" ]; then
            git fetch --no-tags --depth=1 origin main
          fi
          mkdir -p ci-card
          SIZE_REPORT=ci-card/size.md scripts/size-card.sh

      - name: Upload size fragment
        uses: actions/upload-artifact@v4
        with:
          name: card-size
          path: ci-card/size.md
          if-no-files-found: error

  card-comment:
    name: Comment CI card
    needs: [coverage, size]
    runs-on: ubuntu-latest
    # Only PRs from this repo get a comment; fork PRs have a read-only token.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download card fragments
        uses: actions/download-artifact@v4
        with:
          name: card-fragments
          path: ci-card
      - name: Download size fragment
        uses: actions/download-artifact@v4
        with:
          name: card-size
          path: ci-card
      - name: Assemble and post the CI card
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CARD_DIR=ci-card CARD_FILE=card.md scripts/pr-card.sh
          scripts/pr-card-comment.sh

  # Single aggregation gate. Because the path-gated jobs above can be "skipped",
  # make THIS the sole required status check in branch protection: it always runs
  # and passes only if no needed job actually failed (skipped/success both pass).
  ci-ok:
    name: CI
    if: always()
    needs: [changes, lint, platform-test, spec2, tinygo, coverage, size]
    runs-on: ubuntu-latest
    steps:
      - name: Verify no required job failed
        run: |
          results='${{ join(needs.*.result, ' ') }}'
          echo "job results: $results"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::a required job did not pass ($r)"
              exit 1
            fi
          done
          echo "all required jobs passed or were skipped"
