<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="470" viewBox="0 0 900 470" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  .title { font: bold 20px sans-serif; fill: #1f2937; }
  .axis-label { font: 14px sans-serif; fill: #374151; }
  .tick { font: 12px sans-serif; fill: #6b7280; }
  .grid { stroke: #e5e7eb; stroke-dasharray: 3,3; }
  .parity { stroke: #475569; stroke-width: 1.5; stroke-dasharray: 5,4; }
  .axis { stroke: #9ca3af; stroke-width: 1.5; }
  .bar-label { font: bold 11px sans-serif; fill: #374151; text-anchor: middle; }
  .legend-text { font: 13px sans-serif; fill: #374151; }
</style></defs>
<rect width="900" height="470" fill="#fff"/>
<text x="450" y="34" text-anchor="middle" class="title">wago speedup vs wazero  (higher = wago faster, log scale)</text>
<line x1="70.0" y1="400.0" x2="860.0" y2="400.0" class="grid"/>
<text x="60.0" y="404.0" text-anchor="end" class="tick">0.5×</text>
<line x1="70.0" y1="347.7" x2="860.0" y2="347.7" class="parity"/>
<text x="60.0" y="351.7" text-anchor="end" class="tick">1×</text>
<line x1="70.0" y1="295.4" x2="860.0" y2="295.4" class="grid"/>
<text x="60.0" y="299.4" text-anchor="end" class="tick">2×</text>
<line x1="70.0" y1="226.3" x2="860.0" y2="226.3" class="grid"/>
<text x="60.0" y="230.3" text-anchor="end" class="tick">5×</text>
<line x1="70.0" y1="174.1" x2="860.0" y2="174.1" class="grid"/>
<text x="60.0" y="178.1" text-anchor="end" class="tick">10×</text>
<line x1="70.0" y1="121.8" x2="860.0" y2="121.8" class="grid"/>
<text x="60.0" y="125.8" text-anchor="end" class="tick">20×</text>
<rect x="109.5" y="89.8" width="79.0" height="310.2" fill="#10b981" rx="4"/>
<text x="149.0" y="82.8" text-anchor="middle" class="bar-label">30.6×</text>
<text x="149.0" y="422.0" text-anchor="middle" class="tick">compile</text>
<rect x="267.5" y="386.2" width="79.0" height="13.8" fill="#ef4444" rx="4"/>
<text x="307.0" y="379.2" text-anchor="middle" class="bar-label">0.6×</text>
<text x="307.0" y="422.0" text-anchor="middle" class="tick">instantiate</text>
<rect x="425.5" y="268.3" width="79.0" height="131.7" fill="#10b981" rx="4"/>
<text x="465.0" y="261.3" text-anchor="middle" class="bar-label">2.9×</text>
<text x="465.0" y="422.0" text-anchor="middle" class="tick">call overhead</text>
<rect x="583.5" y="329.7" width="79.0" height="70.3" fill="#10b981" rx="4"/>
<text x="623.0" y="322.7" text-anchor="middle" class="bar-label">1.3×</text>
<text x="623.0" y="422.0" text-anchor="middle" class="tick">fib loop</text>
<rect x="741.5" y="369.3" width="79.0" height="30.7" fill="#ef4444" rx="4"/>
<text x="781.0" y="362.3" text-anchor="middle" class="bar-label">0.8×</text>
<text x="781.0" y="422.0" text-anchor="middle" class="tick">fib recursion</text>
<line x1="70.0" y1="70.0" x2="70.0" y2="400.0" class="axis"/>
<line x1="70.0" y1="400.0" x2="860.0" y2="400.0" class="axis"/>
