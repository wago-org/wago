<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg">
<defs><style>
  .title { font: bold 20px sans-serif; fill: #1f2937; }
  .axis-label { font: 14px sans-serif; fill: #374151; }
  .tick { font: 12px sans-serif; fill: #6b7280; }
  .grid { stroke: #e5e7eb; stroke-dasharray: 3,3; }
  .parity { stroke: #475569; stroke-width: 1.5; stroke-dasharray: 5,4; }
  .axis { stroke: #9ca3af; stroke-width: 1.5; }
  .bar-label { font: bold 11px sans-serif; fill: #374151; text-anchor: middle; }
  .legend-text { font: 13px sans-serif; fill: #374151; }
</style></defs>
<rect width="900" height="480" fill="#fff"/>
<text x="450" y="34" text-anchor="middle" class="title">latency: ns per operation  (log scale, lower = faster)</text>
<line x1="80.0" y1="410.0" x2="750.0" y2="410.0" class="grid"/>
<text x="70.0" y="414.0" text-anchor="end" class="tick">1 ns</text>
<line x1="80.0" y1="353.3" x2="750.0" y2="353.3" class="grid"/>
<text x="70.0" y="357.3" text-anchor="end" class="tick">10 ns</text>
<line x1="80.0" y1="296.7" x2="750.0" y2="296.7" class="grid"/>
<text x="70.0" y="300.7" text-anchor="end" class="tick">100 ns</text>
<line x1="80.0" y1="240.0" x2="750.0" y2="240.0" class="grid"/>
<text x="70.0" y="244.0" text-anchor="end" class="tick">1 µs</text>
<line x1="80.0" y1="183.3" x2="750.0" y2="183.3" class="grid"/>
<text x="70.0" y="187.3" text-anchor="end" class="tick">10 µs</text>
<line x1="80.0" y1="126.7" x2="750.0" y2="126.7" class="grid"/>
<text x="70.0" y="130.7" text-anchor="end" class="tick">100 µs</text>
<line x1="80.0" y1="70.0" x2="750.0" y2="70.0" class="grid"/>
<text x="70.0" y="74.0" text-anchor="end" class="tick">1 ms</text>
<rect x="106.8" y="222.6" width="37.0" height="187.4" fill="#3b82f6" rx="4"/>
<text x="125.3" y="217.6" text-anchor="middle" class="bar-label">2.0 µs</text>
<rect x="147.0" y="138.4" width="37.0" height="271.6" fill="#f59e0b" rx="4"/>
<text x="165.5" y="133.4" text-anchor="middle" class="bar-label">62.0 µs</text>
<text x="147.0" y="432.0" text-anchor="middle" class="tick">compile</text>
<rect x="240.8" y="175.4" width="37.0" height="234.6" fill="#3b82f6" rx="4"/>
<text x="259.3" y="170.4" text-anchor="middle" class="bar-label">13.8 µs</text>
<rect x="281.0" y="188.0" width="37.0" height="222.0" fill="#f59e0b" rx="4"/>
<text x="299.5" y="183.0" text-anchor="middle" class="bar-label">8.3 µs</text>
<text x="281.0" y="432.0" text-anchor="middle" class="tick">instantiate</text>
<rect x="374.8" y="351.5" width="37.0" height="58.5" fill="#3b82f6" rx="4"/>
<text x="393.3" y="346.5" text-anchor="middle" class="bar-label">10.8 ns</text>
<rect x="415.0" y="325.6" width="37.0" height="84.4" fill="#f59e0b" rx="4"/>
<text x="433.5" y="320.6" text-anchor="middle" class="bar-label">30.8 ns</text>
<text x="415.0" y="432.0" text-anchor="middle" class="tick">call overhead</text>
<rect x="508.8" y="323.0" width="37.0" height="87.0" fill="#3b82f6" rx="4"/>
<text x="527.3" y="318.0" text-anchor="middle" class="bar-label">34.3 ns</text>
<rect x="549.0" y="317.1" width="37.0" height="92.9" fill="#f59e0b" rx="4"/>
<text x="567.5" y="312.1" text-anchor="middle" class="bar-label">43.5 ns</text>
<text x="549.0" y="432.0" text-anchor="middle" class="tick">fib loop</text>
<rect x="642.8" y="80.6" width="37.0" height="329.4" fill="#3b82f6" rx="4"/>
<text x="661.3" y="75.6" text-anchor="middle" class="bar-label">651 µs</text>
<rect x="683.0" y="87.6" width="37.0" height="322.4" fill="#f59e0b" rx="4"/>
<text x="701.5" y="82.6" text-anchor="middle" class="bar-label">489 µs</text>
<text x="683.0" y="432.0" text-anchor="middle" class="tick">fib recursion</text>
<line x1="80.0" y1="70.0" x2="80.0" y2="410.0" class="axis"/>
<line x1="80.0" y1="410.0" x2="750.0" y2="410.0" class="axis"/>
<rect x="774.0" y="58.0" width="18.0" height="18.0" fill="#3b82f6" rx="4"/>
<text x="800.0" y="72.0" text-anchor="start" class="legend-text">wago</text>
<rect x="774.0" y="86.0" width="18.0" height="18.0" fill="#f59e0b" rx="4"/>
<text x="800.0" y="100.0" text-anchor="start" class="legend-text">wazero</text>
</svg>